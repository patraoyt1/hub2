<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Hub Profissional - P4TR40</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-dark: #1C1C1E;
            --accent-blue: #00d2ff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(0, 210, 255, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('Gemini.png'); 
            background-size: cover;
            background-position: center top;
            filter: blur(3px) brightness(0.3); 
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            z-index: 1;
            animation: fadeIn 1.2s ease-out;
            padding: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--accent-blue);
            margin-bottom: 15px;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.4);
            object-fit: cover;
        }

        h1 { font-size: 1.6rem; margin-bottom: 5px; letter-spacing: -0.5px; }
        .bio { opacity: 0.7; font-size: 0.95rem; margin-bottom: 35px; }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-item {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 18px 24px;
            border-radius: 16px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .link-item i {
            font-size: 1.3rem;
            width: 28px;
            color: var(--accent-blue);
        }

        .link-text {
            flex-grow: 1;
            text-align: center;
            margin-right: 28px;
        }

        .link-item:active {
            transform: scale(0.96);
            background: rgba(0, 210, 255, 0.15);
        }

        @media (min-width: 768px) {
            .link-item:hover {
                background: rgba(0, 210, 255, 0.1);
                border-color: var(--accent-blue);
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            }
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="container">
        <img src="Profile.jpeg" alt="P4TR40" class="profile-img">
        
        <h1>P4TR40</h1>
        <p class="bio">Meus projetos.</p>

        <div class="links-wrapper">       
            <a href="https://patraoyt1.github.io/Test3D-Phone/" target="_blank" class="link-item">
                <i class="fab fa-github"></i>
                <span class="link-text">Test3D-Phone🚀</span>
            </a>

            <a href="https://patraoyt1.github.io/Zaplink/" target="_blank" class="link-item">
                <i class="fab fa-github"></i>
                <span class="link-text">ZapLINK🔗</span>
            </a>

            <a href="https://patraoyt1.github.io/TempMailX/" target="_blank" class="link-item">
                <i class="fab fa-github"></i>
                <span class="link-text">TempMailX📥</span>
            </a>

            <a href="https://patraoyt1.github.io/GeneratorX/" target="_blank" class="link-item">
                <i class="fab fa-github"></i>
                <span class="link-text">GeneratorX🔐</span>
            </a>

            <a href="https://patraoyt1.github.io/MoneyX/" target="_blank" class="link-item">
                <i class="fab fa-github"></i>
                <span class="link-text">MoneyX💰</span>
            </a>
          

            <a href="mailto:contatopatrao@hotmail.com" class="link-item">
                <i class="fas fa-envelope"></i>
                <span class="link-text">E-mail</span>
            </a>
        </div>
    </div>

</body>
</html>
